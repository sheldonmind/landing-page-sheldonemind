<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://seldonmindev.s3.ap-southeast-2.amazonaws.com/logo/logo_light.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheldonmind – Multi‑Model AI Workspace</title>
    <meta
      name="description"
      content="SheldonMind — AI chat, text-to-image, text-to-video (T2V, I2V, V2V). Multiple models, one credit system. Gallery, file library, and Google sign-in."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,400;1,500;1,600&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var logoUrl = "https://seldonmindev.s3.ap-southeast-2.amazonaws.com/logo/logo_light.svg";
        var img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function () {
          var size = 32;
          var radius = 8;
          var canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext("2d");
          if (!ctx) return;
          ctx.beginPath();
          ctx.moveTo(radius, 0);
          ctx.arcTo(size, 0, size, size, radius);
          ctx.arcTo(size, size, 0, size, radius);
          ctx.arcTo(0, size, 0, 0, radius);
          ctx.arcTo(0, 0, size, 0, radius);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          try {
            var dataUrl = canvas.toDataURL("image/png");
            var link = document.querySelector('link[rel="icon"]');
            if (link && dataUrl) {
              link.href = dataUrl;
              link.type = "image/png";
            }
          } catch (e) {}
        };
        img.onerror = function () {};
        img.src = logoUrl;
      })();
    </script>
  </head>
  <body class="h-full overflow-x-hidden bg-background text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
